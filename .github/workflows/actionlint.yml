name: actionlint

# Validates GitHub Actions workflow YAML against actionlint's rule set —
# interpolation/quoting bugs, bad needs: refs, shell-quoting, and
# untrusted-input-in-run-script injection patterns.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install actionlint v1.7.1
        run: |
          set -euo pipefail
          curl -fsSL -o actionlint.tgz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.1/actionlint_1.7.1_linux_amd64.tar.gz
          tar xzf actionlint.tgz actionlint
          chmod +x actionlint
          ./actionlint -version

      - name: Run actionlint
        run: ./actionlint -color
