name: NPM_TOKEN health

# Daily check that NPM_TOKEN still authenticates against the npm registry.
# Opens a GitHub issue if `npm whoami` fails — catches token rot, revocation,
# or scope changes before the next release fails at publish. Same pattern as
# the other askalf packages.
#
# Triggers: daily at 04:23 UTC (offset from siblings) + workflow_dispatch.

on:
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  whoami:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Check NPM_TOKEN
        id: check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          whoami_out=$(npm whoami --registry=https://registry.npmjs.org 2>&1)
          whoami_exit=$?
          set -e
          echo "exit=$whoami_exit" >> "$GITHUB_OUTPUT"
          echo "$whoami_out" > whoami.txt
          if [ "$whoami_exit" = "0" ]; then
            echo "NPM_TOKEN healthy. whoami: $whoami_out"
          else
            echo "::error::NPM_TOKEN authentication failed (exit $whoami_exit)"
            echo "--- whoami output ---"
            cat whoami.txt
          fi

      - name: Open issue on token failure
        if: steps.check.outputs.exit != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          marker='<!-- casey-npm-token-rot -->'
          existing=$(gh issue list -R "${{ github.repository }}" --state open --search "in:body $marker" --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            echo "Existing open token-rot issue #$existing — leaving alone."
            exit 0
          fi
          body_file=$(mktemp)
          {
            echo "$marker"
            echo ""
            echo "### NPM_TOKEN authentication failed"
            echo ""
            echo "Daily \`npm whoami\` check could not authenticate to the npm registry. The token is likely expired, revoked, or has had its scopes changed."
            echo ""
            echo "**Impact:** the next \`casey-cli\` release will fail at npm publish. Fix the secret, then re-trigger a release."
            echo ""
            echo "### To fix"
            echo ""
            echo "1. npmjs.com → Access Tokens → Generate New Token → Granular Access Token"
            echo "2. Scope: \`casey-cli\` with Read and write permission"
            echo "3. \`gh secret set NPM_TOKEN -R askalf/casey\` (paste when prompted)"
            echo "4. Verify: \`gh workflow run npm-token-health.yml -R askalf/casey\` — this issue auto-closes when the next check passes"
            echo "5. Re-publish a stranded release by bumping the patch version on main (auto-release.yml republishes)"
            echo ""
            echo "### whoami output"
            echo ""
            echo "\`\`\`"
            cat whoami.txt
            echo "\`\`\`"
            echo ""
            echo "### Workflow run"
            echo ""
            echo "[Run #${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > "$body_file"
          gh issue create -R "${{ github.repository }}" --title "NPM_TOKEN auth failed — token rot detected" --body-file "$body_file"

      - name: Auto-close any open token-rot issue on success
        if: steps.check.outputs.exit == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          marker='<!-- casey-npm-token-rot -->'
          open_issues=$(gh issue list -R "${{ github.repository }}" --state open --search "in:body $marker" --json number --jq '.[].number')
          for n in $open_issues; do
            gh issue close "$n" -R "${{ github.repository }}" --comment "Auto-closed: \`npm whoami\` succeeded on [run #${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}). Token healthy again."
          done
