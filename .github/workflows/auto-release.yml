name: Auto-release

# Triggered when package.json's "version" field changes on main.
# Publishes to npm, then tags vX.Y.Z and creates a GitHub release from the
# matching CHANGELOG section. Idempotent — if the tag already exists the job
# exits cleanly, so manual re-runs are safe.

on:
  push:
    branches: [main]
    paths:
      - package.json
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # need history to detect an actual version bump

      - name: Read version from package.json
        id: version
        run: |
          set -euo pipefail
          v=$(node -p "require('./package.json').version")
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "tag=v${v}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${v}"

      - name: Skip if tag already exists
        id: gate
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if version field didn't change in this push
        id: bumped
        if: steps.gate.outputs.skip != 'true'
        env:
          NEW: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          old=$(git show "HEAD~1:package.json" 2>/dev/null | node -e "
            let s = ''; process.stdin.on('data', d => s += d).on('end', () => {
              try { console.log(JSON.parse(s).version); } catch { console.log(''); }
            });
          " || echo "")
          echo "old=${old}"
          echo "new=${NEW}"
          if [ "$old" = "$NEW" ]; then
            echo "Version unchanged ($old → $NEW); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version bumped: $old → $NEW"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install + build + test
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        run: |
          set -euo pipefail
          npm ci
          npm run typecheck
          npm run build
          npm test
        env:
          ANTHROPIC_API_KEY: sk-test-not-used-in-offline-tests

      - name: Verify VERSION constant matches package.json
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          actual=$(node dist/cli.js --version | sed -E 's/^casey v//')
          if [ "$actual" != "$EXPECTED" ]; then
            echo "Version mismatch: package.json says $EXPECTED but casey --version says $actual."
            echo "Bump src/cli.ts's VERSION constant to match before releasing."
            exit 1
          fi
          echo "Version constants in sync: $actual"

      # Publish FIRST — it's the step most likely to fail (token scope, network).
      # If it fails, no tag or GitHub release is created, so a re-run after the
      # fix proceeds cleanly instead of skipping on an orphan tag.
      - name: Publish to npm
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Create annotated tag
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name 'askalf'
          git config user.email 'support@askalf.org'
          git tag -a "$TAG" -m "$TAG"
          git push origin "$TAG"

      - name: Extract this version's CHANGELOG section
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { found=1; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "(No CHANGELOG section for v$VERSION — please update CHANGELOG.md.)" > release-notes.md
          fi

      - name: Create GitHub release
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            --verify-tag
